name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python }}
      # banto is stdlib-only — nothing to install, just prove it holds together.
      - name: compile
        run: python -m py_compile banto.py banto_lb.py
      - name: installer syntax (POSIX sh)
        if: runner.os != 'Windows'
        run: sh -n install.sh
      - name: version consistency (banto.py VERSION == pyproject)
        run: python .github/scripts/check_version.py
      - name: smoke (import + pure functions, offline)
        run: python .github/scripts/smoke.py
